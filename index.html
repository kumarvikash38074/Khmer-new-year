<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Laly 🌸</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffe0ec, #ffe9d6);

  display: flex;
  justify-content: center;
  align-items: flex-start;

  min-height: 100vh;
  padding: 20px 15px;

  overflow-x: hidden;
  overflow-y: auto;

  color: #444;
}

/* Container */
.container {
  width: 100%;
  max-width: 420px;
  margin-top: 10px;
}

/* Card */
.card {
  backdrop-filter: blur(15px);
  background: rgba(255, 255, 255, 0.3);
  border-radius: 20px;
  padding: 20px;

  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
  text-align: center;
}

/* Headings */
h1 {
  font-size: 1.8em;
  color: #ff4d6d;
  margin: 10px 0;
}

/* Button */
button {
  margin-top: 15px;
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: #ff6b81;
  color: white;
  font-size: 16px;
  cursor: pointer;
  width: 100%;
  max-width: 250px;
}

/* Hidden */
.hidden {
  display: none;
}

/* Photo */
.photo {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  object-fit: cover;
  object-position: center 25%;
  margin: 15px auto;
  display: block;
  border: 4px solid white;
  box-shadow: 0 8px 25px rgba(0,0,0,0.25);
}

/* Message */
#message {
  margin-top: 15px;
  font-size: 1rem;
  line-height: 1.6em;
  white-space: pre-line;
}

/* Gift */
.gift {
  font-size: 50px;
  cursor: pointer;
  margin-top: 15px;
}

/* Floating */
.float {
  position: fixed;
  bottom: -10px;
  animation: rise 8s linear infinite;
  pointer-events: none;
}

@keyframes rise {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-110vh); opacity: 0; }
}

/* Fade */
.fade {
  animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@media (min-height: 700px) {
  body {
    align-items: center;
  }
}
</style>
</head>

<body>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<div class="container">

  <!-- INTRO -->
  <div id="intro" class="card">
    <h1>💫 A little surprise for Laly...</h1>
    <button onclick="start()">Tap gently 💖</button>
  </div>

  <!-- MAIN -->
  <div id="main" class="card hidden">

    <h1>🌸 Happy Khmer New Year 🌸</h1>
    <p>សួស្តីឆ្នាំថ្មី Laly ✨</p>

    <!-- PHOTO -->
    <img src="her.jpg" class="photo" alt="Laly Photo">

    <div id="message"></div>

    <div class="gift" onclick="showGift()">🎁</div>
    <p>tap to open</p>

    <div id="giftText" class="hidden fade">
      <p>✨ Dear Laly...</p>
      <p>This new year, I just hope you smile more 🌼</p>
      <p>feel lighter ☁️</p>
      <p>and stay surrounded by kindness 💖</p>
      <br>
      <p>And maybe…</p>
      <p>someone quietly wishes</p>
      <p>that your happiness never fades 🌙</p>
    </div>

  </div>
</div>

<script>

function start() {
  document.getElementById("intro").classList.add("hidden");
  document.getElementById("main").classList.remove("hidden");

  document.getElementById("music").play();

  typeText();
  floating();
}

// Typewriter
let text = `On this special Khmer New Year... 🌸

Some people don’t need loud words...

They just quietly become
someone’s beautiful thought...

And Laly...
you are one of them 💫`;

let i = 0;

function typeText() {
  if (i < text.length) {
    document.getElementById("message").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeText, 35);
  }
}

// Gift
function showGift() {
  document.getElementById("giftText").classList.remove("hidden");
}

// Floating
function floating() {
  setInterval(() => {
    let el = document.createElement("div");
    el.className = "float";
    el.innerHTML = Math.random() > 0.5 ? "💖" : "🌸";
    el.style.left = Math.random() * 100 + "vw";
    el.style.fontSize = (Math.random() * 20 + 15) + "px";

    document.body.appendChild(el);
    setTimeout(() => el.remove(), 8000);
  }, 400);
}

</script>

</body>
</html>
